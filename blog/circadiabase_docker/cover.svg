    <text x="145" y="208" text-anchor="middle" font-family="monospace" font-size="11" fill="#EEF5FF">pyActigraphy</text>
    <text x="245" y="201" text-anchor="middle" font-family="monospace" font-size="12" fill="#EEF5FF">MNE</text>
    <text x="245" y="217" text-anchor="middle" font-family="monospace" font-size="11" fill="#C8DFF5">YASA</text>
