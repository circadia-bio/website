<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <title>circadiaBase Docker tutorial cover</title>
  <rect width="1200" height="630" fill="#1E3A5F"/>

  <!-- Background grid -->
  <g stroke="#2D5A8E" stroke-width="1" opacity="0.3">
