    <rect x="200" y="0"  width="90" height="70" rx="8" fill="#4A7BB5" opacity="0.9"/>
    <!-- Row 2 -->
    <rect x="0"   y="80" width="90" height="70" rx="8" fill="#6A9BD4" opacity="0.9"/>
    <rect x="100" y="80" width="90" height="70" rx="8" fill="#6A9BD4" opacity="0.9"/>
    <!-- Row 3 -->
    <rect x="0"   y="160" width="90" height="70" rx="8" fill="#8AB8E8" opacity="0.9"/>
    <!-- Labels -->
    <text x="45"  y="42"  text-anchor="middle" font-family="monospace" font-size="11" fill="#EEF5FF">Python</text>
    <text x="45"  y="56"  text-anchor="middle" font-family="monospace" font-size="10" fill="#C8DFF5">3.11</text>
    <text x="145" y="42"  text-anchor="middle" font-family="monospace" font-size="11" fill="#EEF5FF">pyActi-</text>
    <text x="145" y="56"  text-anchor="middle" font-family="monospace" font-size="10" fill="#C8DFF5">graphy</text>
    <text x="245" y="42"  text-anchor="middle" font-family="monospace" font-size="11" fill="#EEF5FF">MNE</text>
    <text x="245" y="56"  text-anchor="middle" font-family="monospace" font-size="10" fill="#C8DFF5">YASA</text>
    <text x="45"  y="122" text-anchor="middle" font-family="monospace" font-size="11" fill="#1E3A5F">R 4.4</text>
    <text x="145" y="122" text-anchor="middle" font-family="monospace" font-size="11" fill="#1E3A5F">GGIR</text>
    <text x="45"  y="202" text-anchor="middle" font-family="monospace" font-size="11" fill="#1E3A5F">brms</text>
    <!-- Wave base -->
    <path d="M-20,245 Q55,228 130,245 Q205,262 290,245 Q340,235 360,245 L360,275 L-20,275 Z" fill="#2D5A8E" opacity="0.7"/>
  </g>

  <!-- Arrow -->
  <g transform="translate(480, 285)">
    <line x1="0" y1="30" x2="80" y2="30" stroke="#E07A20" stroke-width="3"/>
    <polygon points="80,22 96,30 80,38" fill="#E07A20"/>
    <text x="40" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#E07A20">docker-compose</text>
    <text x="40" y="52" text-anchor="middle" font-family="monospace" font-size="11" fill="#E07A20">up --build</text>
  </g>

  <!-- Browser windows — right side -->
  <!-- JupyterLab -->
  <g transform="translate(610, 110)">
    <rect width="250" height="160" rx="10" fill="#0D1117"/>
    <rect width="250" height="28" rx="10" fill="#161B22"/>
    <rect x="0" y="18" width="250" height="10" fill="#161B22"/>
    <circle cx="16" cy="14" r="5" fill="#FF5F57"/>
    <circle cx="32" cy="14" r="5" fill="#FEBC2E"/>
    <circle cx="48" cy="14" r="5" fill="#28C840"/>
    <text x="125" y="17" text-anchor="middle" font-family="monospace" font-size="9" fill="#8B949E">localhost:8889/lab</text>
    <!-- Jupyter content -->
    <text x="12" y="50"  font-family="monospace" font-size="10" fill="#79C0FF">import</text>
    <text x="65" y="50"  font-family="monospace" font-size="10" fill="#E6EDF3"> pyActigraphy</text>
    <text x="12" y="66"  font-family="monospace" font-size="10" fill="#79C0FF">import</text>
    <text x="65" y="66"  font-family="monospace" font-size="10" fill="#E6EDF3"> pandas </text>
    <text x="130" y="66" font-family="monospace" font-size="10" fill="#79C0FF">as</text>
    <text x="148" y="66" font-family="monospace" font-size="10" fill="#E6EDF3"> pd</text>
    <text x="12" y="82"  font-family="monospace" font-size="10" fill="#3FB950">pipe </text>
    <text x="46" y="82"  font-family="monospace" font-size="10" fill="#E6EDF3">= SleepPipeline(</text>
    <text x="12" y="98"  font-family="monospace" font-size="10" fill="#E6EDF3">  </text>
    <text x="22" y="98"  font-family="monospace" font-size="10" fill="#A5D6FF">"subject_01.txt"</text>
    <text x="12" y="114" font-family="monospace" font-size="10" fill="#E6EDF3">result </text>
    <text x="56" y="114" font-family="monospace" font-size="10" fill="#E6EDF3">= pipe.run()</text>
    <text x="12" y="130" font-family="monospace" font-size="10" fill="#E6EDF3">result.plot()</text>
    <text x="12" y="150" font-family="monospace" font-size="9"  fill="#8B949E">🪐 JupyterLab</text>
  </g>

  <!-- RStudio -->
  <g transform="translate(610, 295)">
    <rect width="250" height="160" rx="10" fill="#1A1A2E"/>
    <rect width="250" height="28" rx="10" fill="#16213E"/>
    <rect x="0" y="18" width="250" height="10" fill="#16213E"/>
    <circle cx="16" cy="14" r="5" fill="#FF5F57"/>
    <circle cx="32" cy="14" r="5" fill="#FEBC2E"/>
    <circle cx="48" cy="14" r="5" fill="#28C840"/>
    <text x="125" y="17" text-anchor="middle" font-family="monospace" font-size="9" fill="#8B949E">localhost:8787</text>
    <!-- R content -->
    <text x="12" y="50"  font-family="monospace" font-size="10" fill="#79C0FF">library</text>
    <text x="60" y="50"  font-family="monospace" font-size="10" fill="#E6EDF3">(GGIR)</text>
    <text x="12" y="66"  font-family="monospace" font-size="10" fill="#79C0FF">library</text>
    <text x="60" y="66"  font-family="monospace" font-size="10" fill="#E6EDF3">(circacompare)</text>
    <text x="12" y="82"  font-family="monospace" font-size="10" fill="#79C0FF">library</text>
    <text x="60" y="82"  font-family="monospace" font-size="10" fill="#E6EDF3">(lme4)</text>
    <text x="12" y="98"  font-family="monospace" font-size="10" fill="#3FB950">fit </text>
    <text x="34" y="98"  font-family="monospace" font-size="10" fill="#E6EDF3">&lt;- lmer(se_pct ~</text>
    <text x="12" y="114" font-family="monospace" font-size="10" fill="#E6EDF3">  condition + (1|id))</text>
    <text x="12" y="150" font-family="monospace" font-size="9"  fill="#8B949E">🔵 RStudio Server</text>
  </g>

  <!-- Title -->
  <text x="600" y="530" text-anchor="middle" font-family="'Georgia', serif" font-size="42" font-weight="700" fill="#EEF5FF" letter-spacing="1">circadiaBase Docker</text>
  <text x="600" y="578" text-anchor="middle" font-family="'Georgia', serif" font-size="22" fill="#8AB8E8" letter-spacing="2">Setup &amp; Tutorial</text>
</svg>
