  <!-- JupyterLab -->
  <g transform="translate(794, 110)">
    <rect width="260" height="160" rx="10" fill="#0D1117"/>
    <rect width="260" height="28" rx="10" fill="#161B22"/>
    <rect x="0" y="18" width="260" height="10" fill="#161B22"/>
    <circle cx="16" cy="14" r="5" fill="#FF5F57"/>
