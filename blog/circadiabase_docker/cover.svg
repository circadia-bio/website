    <text x="12" y="50"  font-family="monospace" font-size="10" fill="#79C0FF">import</text>
    <text x="65" y="50"  font-family="monospace" font-size="10" fill="#E6EDF3"> pyActigraphy</text>
    <text x="12" y="66"  font-family="monospace" font-size="10" fill="#79C0FF">import</text>
    <text x="65" y="66"  font-family="monospace" font-size="10" fill="#E6EDF3"> pandas as pd</text>
    <text x="12" y="82"  font-family="monospace" font-size="10" fill="#3FB950">pipe </text>
    <text x="46" y="82"  font-family="monospace" font-size="10" fill="#E6EDF3">= SleepPipeline(</text>
    <text x="12" y="98"  font-family="monospace" font-size="10" fill="#A5D6FF">  "subject_01.txt"</text>
    <text x="12" y="114" font-family="monospace" font-size="10" fill="#E6EDF3">result = pipe.run()</text>
    <text x="12" y="130" font-family="monospace" font-size="10" fill="#E6EDF3">result.plot()</text>
    <text x="12" y="150" font-family="monospace" font-size="9"  fill="#8B949E">🪐 JupyterLab</text>
  </g>
  <!-- RStudio -->
  <g transform="translate(794, 290)">
    <rect width="260" height="160" rx="10" fill="#1A1A2E"/>
    <rect width="260" height="28" rx="10" fill="#16213E"/>
    <rect x="0" y="18" width="260" height="10" fill="#16213E"/>
    <circle cx="16" cy="14" r="5" fill="#FF5F57"/>
    <circle cx="32" cy="14" r="5" fill="#FEBC2E"/>
    <circle cx="48" cy="14" r="5" fill="#28C840"/>
    <text x="130" y="17" text-anchor="middle" font-family="monospace" font-size="9" fill="#8B949E">localhost:8787</text>
    <text x="12" y="50"  font-family="monospace" font-size="10" fill="#79C0FF">library</text>
    <text x="60" y="50"  font-family="monospace" font-size="10" fill="#E6EDF3">(GGIR)</text>
    <text x="12" y="66"  font-family="monospace" font-size="10" fill="#79C0FF">library</text>
    <text x="60" y="66"  font-family="monospace" font-size="10" fill="#E6EDF3">(circacompare)</text>
    <text x="12" y="82"  font-family="monospace" font-size="10" fill="#79C0FF">library</text>
    <text x="60" y="82"  font-family="monospace" font-size="10" fill="#E6EDF3">(lme4)</text>
    <text x="12" y="98"  font-family="monospace" font-size="10" fill="#3FB950">fit </text>
    <text x="34" y="98"  font-family="monospace" font-size="10" fill="#E6EDF3">&lt;- lmer(se_pct ~</text>
    <text x="12" y="114" font-family="monospace" font-size="10" fill="#E6EDF3">  condition + (1|id))</text>
    <text x="12" y="150" font-family="monospace" font-size="9"  fill="#8B949E">🔵 RStudio Server</text>
  </g>

  <!-- Title -->
  <text x="600" y="530" text-anchor="middle" font-family="'Georgia', serif" font-size="42" font-weight="700" fill="#EEF5FF" letter-spacing="1">circadiaBase Docker</text>
  <text x="600" y="578" text-anchor="middle" font-family="'Georgia', serif" font-size="22" fill="#8AB8E8" letter-spacing="2">Setup &amp; Tutorial</text>
