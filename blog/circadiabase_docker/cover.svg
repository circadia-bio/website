    <text x="145" y="40" text-anchor="middle" font-family="monospace" font-size="13" fill="#1E3A5F">brms</text>
    <!-- Wave -->
    <path d="M-60,252 Q75,238 145,252 Q215,266 290,252 Q345,242 400,252 L400,285 L-60,285 Z" fill="#2D5A8E" opacity="0.7"/>
  </g>

