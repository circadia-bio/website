- title: "Sleep Diaries"
  path: projects/sleep-diaries/index.qmd
  image: projects/images/sleepdiaries_social.png
  description: >
    An open-source mobile app for collecting sleep diary data in clinical and research
    settings, built with React Native & Expo. Morning & evening questionnaires, sleep
    metrics, and CSV/JSON data export.
  categories: [Mobile App, Sleep, Open Source, React Native]
  date: 2025-01-01

- title: "slumbR"
  path: projects/slumbr/index.qmd
  image: projects/images/slumbr_logo.svg
  description: >
    The official R companion to the Sleep Diaries app. Reads participant JSON exports,
    computes sleep diary variables, and returns tidy data frames ready for statistical
    analysis.
  categories: [R Package, Sleep, Open Source]
  date: 2025-01-01

- title: "zeitR"
  path: projects/zeitr/index.qmd
  image: projects/images/zeitr_logo.png
  description: >
    An R package for importing raw actigraphy recordings and running a complete
    rest–activity pipeline — off-wrist detection, sleep and nap detection, WASO,
    and non-parametric circadian rhythm analysis. Validated epoch-for-epoch against
    the Condor circadiaBase Python reference.
  categories: [R Package, Actigraphy, Sleep, Open Source]
  date: 2026-06-01

- title: "ScoreMe"
  path: projects/scoreme/index.qmd
  image: projects/images/scoreme_og.png
  description: >
    A lightweight web app for scoring validated research questionnaires in the browser.
    Supports a growing library of sleep and chronobiology instruments. No installation
    required.
  categories: [Web App, Questionnaires, Open Source]
  date: 2025-03-01

- title: "tallieR"
  path: projects/tallier/index.qmd
  image: projects/images/tallier_logo.svg
  description: >
    An R package for importing, re-scoring, and tidying questionnaire data collected
    with ScoreMe. Supports longitudinal data, custom instruments, and reliability
    analysis.
  categories: [R Package, Questionnaires, Open Source]
  date: 2025-03-01

- title: "circadiaBase Docker"
  path: projects/circadiabase-docker/index.qmd
  image: projects/images/circadiabase_docker.svg
  description: >
    A reproducible Docker environment for chronobiology and actigraphy research,
    bundling Jupyter (Python 3.11 + pyActigraphy) and RStudio (R 4.4 + GGIR, brms,
    and more). Spin up a full analysis stack with a single command.
  categories: [Infrastructure, Docker, Python, R]
  date: 2024-06-01

- title: "PineTime Research Platform"
  path: projects/pinetime/index.qmd
  image: projects/images/pinetime_research.svg
  description: >
    An open-source wearable research platform built on the PineTime smartwatch.
    Comprises a custom InfiniTime firmware fork and a companion web app for device
    configuration and data offload. Currently in active development.
  categories: [Wearables, Firmware, In Development]
  date: 2025-06-01

- title: "ACTT Validation Study"
  path: projects/actt-validation/index.qmd
  image: projects/images/actt_validation.svg
  description: >
    A fully reproducible R/Quarto pipeline validating the ActTrust® actigraphy device
    for energy expenditure and physical activity classification, benchmarked against
    the ActiGraph® GT3X+ and indirect calorimetry.
  categories: [Research Pipeline, Actigraphy, R, Reproducible Research]
  date: 2024-09-01

- title: "Cycling & EEG Entropy"
  path: projects/cycling-entropy/index.qmd
  image: projects/images/cycling_entropy.svg
  description: >
    An R pipeline examining recurrence-matrix entropy in scalp EEG signals recorded
    during cycling and rest across four behavioural conditions in healthy adults.
  categories: [Research Pipeline, EEG, R, Reproducible Research]
  date: 2024-04-01

- title: "Circadian Phenotyping in Visual Impairment"
  path: projects/actigraphy-clustering/index.qmd
  image: projects/images/actigraphy_clustering.svg
  description: >
    A data-driven framework for identifying circadian phenotypes in visually impaired
    participants using non-parametric actigraphy metrics, dimensionality reduction,
    clustering, and SHAP-based interpretation.
  categories: [Research Pipeline, Actigraphy, Chronobiology, Python, Reproducible Research]
  date: 2025-02-01
