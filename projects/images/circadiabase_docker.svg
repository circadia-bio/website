<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" role="img">
  <title>circadiaBase Docker</title>
  <rect width="680" height="400" fill="#1E3A5F"/>
  <!-- Docker-style whale shape, simplified -->
  <g transform="translate(160, 80)">
    <!-- Container stack -->
    <rect x="20"  y="120" width="80" height="36" rx="6" fill="#4A7BB5"/>
    <rect x="20"  y="78"  width="80" height="36" rx="6" fill="#6A9BD4"/>
    <rect x="20"  y="36"  width="80" height="36" rx="6" fill="#8AB8E8"/>
    <rect x="110" y="120" width="80" height="36" rx="6" fill="#4A7BB5"/>
    <rect x="110" y="78"  width="80" height="36" rx="6" fill="#6A9BD4"/>
    <rect x="200" y="120" width="80" height="36" rx="6" fill="#4A7BB5"/>
    <!-- Wave/water base -->
    <path d="M0,170 Q45,155 90,170 Q135,185 180,170 Q225,155 280,170 L280,200 L0,200 Z" fill="#2D5A8E" opacity="0.8"/>
  </g>
  <text x="340" y="310" text-anchor="middle" font-family="'Courier New', monospace" font-size="34" font-weight="700" fill="#EEF5FF" letter-spacing="1">circadiaBase</text>
  <text x="340" y="350" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" fill="#4A7BB5" letter-spacing="3">Docker</text>
</svg>
