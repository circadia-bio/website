<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" role="img">
  <title>PineTime Research</title>
  <rect width="680" height="400" fill="#1C2B1E"/>
  <!-- Watch body -->
  <rect x="260" y="80" width="160" height="200" rx="30" fill="#2A3D2C"/>
  <rect x="268" y="88" width="144" height="184" rx="24" fill="#0D1F0F"/>
  <!-- Watch strap top/bottom -->
  <rect x="290" y="40"  width="100" height="44" rx="8" fill="#243526"/>
  <rect x="290" y="276" width="100" height="44" rx="8" fill="#243526"/>
  <!-- Screen content: sine wave -->
  <polyline points="278,185 298,165 318,185 338,145 358,185 378,165 398,185 408,185"
    fill="none" stroke="#4ADE80" stroke-width="3" stroke-linejoin="round"/>
  <!-- Clock hands -->
  <circle cx="340" cy="180" r="4" fill="#4ADE80"/>
  <line x1="340" y1="180" x2="340" y2="148" stroke="#4ADE80" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="340" y1="180" x2="362" y2="188" stroke="#6EE7B7" stroke-width="2" stroke-linecap="round"/>
  <!-- Crown button -->
  <rect x="416" y="162" width="12" height="20" rx="4" fill="#3A5C3C"/>
</svg>
