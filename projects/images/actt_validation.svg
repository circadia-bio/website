<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" role="img">
  <title>ACTT Validation Study</title>
  <rect width="680" height="400" fill="#1E2A3A"/>
  <!-- Scatter plot style: Bland-Altman feel -->
  <!-- Axes -->
  <line x1="100" y1="310" x2="580" y2="310" stroke="#4A7BB5" stroke-width="2"/>
  <line x1="100" y1="60"  x2="100" y2="310" stroke="#4A7BB5" stroke-width="2"/>
  <!-- Mean line -->
  <line x1="100" y1="190" x2="580" y2="190" stroke="#E07A20" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.8"/>
  <!-- LoA lines -->
  <line x1="100" y1="120" x2="580" y2="120" stroke="#E07A20" stroke-width="1" stroke-dasharray="4,6" opacity="0.5"/>
  <line x1="100" y1="260" x2="580" y2="260" stroke="#E07A20" stroke-width="1" stroke-dasharray="4,6" opacity="0.5"/>
  <!-- Scatter dots -->
  <circle cx="145" cy="175" r="5" fill="#6A9BD4" opacity="0.85"/>
  <circle cx="185" cy="205" r="5" fill="#6A9BD4" opacity="0.85"/>
  <circle cx="225" cy="182" r="5" fill="#6A9BD4" opacity="0.85"/>
  <circle cx="265" cy="196" r="5" fill="#6A9BD4" opacity="0.85"/>
  <circle cx="310" cy="171" r="5" fill="#6A9BD4" opacity="0.85"/>
  <circle cx="350" cy="210" r="5" fill="#6A9BD4" opacity="0.85"/>
  <circle cx="390" cy="183" r="5" fill="#6A9BD4" opacity="0.85"/>
  <circle cx="430" cy="200" r="5" fill="#6A9BD4" opacity="0.85"/>
  <circle cx="470" cy="178" r="5" fill="#6A9BD4" opacity="0.85"/>
  <circle cx="510" cy="194" r="5" fill="#6A9BD4" opacity="0.85"/>
  <circle cx="545" cy="173" r="5" fill="#6A9BD4" opacity="0.85"/>
  <!-- Outlier -->
  <circle cx="240" cy="108" r="5" fill="#E07A20" opacity="0.9"/>
  <circle cx="470" cy="267" r="5" fill="#E07A20" opacity="0.9"/>
  <!-- Labels -->
  <text x="340" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#8AB8E8">Bland-Altman · ActTrust® vs ActiGraph® GT3X+</text>
</svg>
