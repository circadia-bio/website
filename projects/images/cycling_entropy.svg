<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" role="img">
  <title>Cycling Entropy EEG</title>
  <rect width="680" height="400" fill="#1A1A2E"/>
  <!-- EEG-like traces for 4 conditions -->
  <!-- Condition 1: rest -->
  <polyline points="60,100 90,95 110,105 130,93 150,108 170,98 190,102 210,96 230,104 250,97 270,103 290,99 310,101 330,96 350,104 370,99 380,100"
    fill="none" stroke="#4A7BB5" stroke-width="1.8" opacity="0.9"/>
  <text x="50" y="88" font-family="monospace" font-size="11" fill="#4A7BB5">REST</text>
  <!-- Condition 2: cycling low -->
  <polyline points="60,170 85,155 100,182 120,148 145,178 165,155 185,175 205,152 228,180 248,158 270,174 288,155 310,172 332,157 355,176 372,160 380,168"
    fill="none" stroke="#6A9BD4" stroke-width="1.8" opacity="0.9"/>
  <text x="50" y="158" font-family="monospace" font-size="11" fill="#6A9BD4">LOW</text>
  <!-- Condition 3: cycling moderate -->
  <polyline points="60,240 80,218 98,258 118,210 140,252 160,214 182,248 202,218 225,252 248,216 268,248 288,220 312,250 332,218 355,246 374,222 380,238"
    fill="none" stroke="#E07A20" stroke-width="1.8" opacity="0.9"/>
  <text x="50" y="228" font-family="monospace" font-size="11" fill="#E07A20">MOD</text>
  <!-- Condition 4: cycling high -->
  <polyline points="60,315 78,285 95,340 115,278 138,338 158,280 180,335 200,278 224,338 246,280 268,336 288,282 312,336 332,280 356,335 374,284 380,310"
    fill="none" stroke="#C084FC" stroke-width="1.8" opacity="0.9"/>
  <text x="50" y="302" font-family="monospace" font-size="11" fill="#C084FC">HIGH</text>
  <!-- Recurrence matrix hint on right -->
  <g transform="translate(440,60)">
    <rect width="180" height="180" fill="none" stroke="#4A7BB5" stroke-width="1" opacity="0.4"/>
    <!-- Simplified diagonal + off-diagonal pattern -->
    <line x1="0" y1="0" x2="180" y2="180" stroke="#E07A20" stroke-width="1" opacity="0.5"/>
    <rect x="20"  y="20"  width="8" height="8" fill="#6A9BD4" opacity="0.7"/>
    <rect x="50"  y="48"  width="8" height="8" fill="#6A9BD4" opacity="0.7"/>
    <rect x="80"  y="78"  width="8" height="8" fill="#6A9BD4" opacity="0.7"/>
    <rect x="110" y="108" width="8" height="8" fill="#6A9BD4" opacity="0.7"/>
    <rect x="140" y="138" width="8" height="8" fill="#6A9BD4" opacity="0.7"/>
    <rect x="30"  y="60"  width="5" height="5" fill="#C084FC" opacity="0.5"/>
    <rect x="65"  y="100" width="5" height="5" fill="#C084FC" opacity="0.5"/>
    <rect x="100" y="40"  width="5" height="5" fill="#C084FC" opacity="0.5"/>
    <rect x="140" y="80"  width="5" height="5" fill="#C084FC" opacity="0.5"/>
    <text x="90" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#8AB8E8">recurrence matrix</text>
  </g>
</svg>
