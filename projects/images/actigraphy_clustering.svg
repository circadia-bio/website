<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" role="img">
  <title>Nonparametric Actigraphy Clustering</title>
  <rect width="680" height="400" fill="#12111A"/>
  <!-- UMAP-style 2D cluster scatter -->
  <!-- Cluster 1: strong circadian (blue) -->
  <circle cx="200" cy="150" r="7"  fill="#4A7BB5" opacity="0.85"/>
  <circle cx="220" cy="170" r="6"  fill="#4A7BB5" opacity="0.75"/>
  <circle cx="190" cy="175" r="8"  fill="#4A7BB5" opacity="0.8"/>
  <circle cx="215" cy="140" r="5"  fill="#4A7BB5" opacity="0.7"/>
  <circle cx="235" cy="155" r="6"  fill="#4A7BB5" opacity="0.8"/>
  <circle cx="205" cy="190" r="5"  fill="#4A7BB5" opacity="0.65"/>
  <circle cx="175" cy="160" r="7"  fill="#4A7BB5" opacity="0.75"/>
  <text x="205" y="215" text-anchor="middle" font-family="monospace" font-size="11" fill="#6A9BD4">entrained</text>
  <!-- Cluster 2: free-running (orange) -->
  <circle cx="430" cy="200" r="8"  fill="#E07A20" opacity="0.85"/>
  <circle cx="455" cy="215" r="6"  fill="#E07A20" opacity="0.75"/>
  <circle cx="410" cy="220" r="7"  fill="#E07A20" opacity="0.8"/>
  <circle cx="448" cy="190" r="5"  fill="#E07A20" opacity="0.7"/>
  <circle cx="420" cy="235" r="6"  fill="#E07A20" opacity="0.8"/>
  <circle cx="465" cy="230" r="5"  fill="#E07A20" opacity="0.65"/>
  <text x="437" y="258" text-anchor="middle" font-family="monospace" font-size="11" fill="#E07A20">free-running</text>
  <!-- Cluster 3: irregular (purple) -->
  <circle cx="310" cy="295" r="7"  fill="#A855F7" opacity="0.85"/>
  <circle cx="335" cy="280" r="6"  fill="#A855F7" opacity="0.75"/>
  <circle cx="290" cy="285" r="8"  fill="#A855F7" opacity="0.8"/>
  <circle cx="325" cy="305" r="5"  fill="#A855F7" opacity="0.7"/>
  <circle cx="350" cy="295" r="6"  fill="#A855F7" opacity="0.8"/>
  <text x="320" y="328" text-anchor="middle" font-family="monospace" font-size="11" fill="#A855F7">irregular</text>
  <!-- SHAP bar hint top right -->
  <g transform="translate(490, 60)">
    <text x="0" y="0" font-family="monospace" font-size="10" fill="#8AB8E8">SHAP importance</text>
    <rect x="0" y="10" width="110" height="10" rx="3" fill="#4A7BB5" opacity="0.8"/>
    <rect x="0" y="26" width="80"  height="10" rx="3" fill="#4A7BB5" opacity="0.65"/>
    <rect x="0" y="42" width="55"  height="10" rx="3" fill="#4A7BB5" opacity="0.5"/>
    <rect x="0" y="58" width="35"  height="10" rx="3" fill="#4A7BB5" opacity="0.4"/>
    <text x="116" y="20"  font-family="monospace" font-size="9" fill="#8AB8E8">IS</text>
    <text x="86"  y="36"  font-family="monospace" font-size="9" fill="#8AB8E8">IV</text>
    <text x="61"  y="52"  font-family="monospace" font-size="9" fill="#8AB8E8">RA</text>
    <text x="41"  y="68"  font-family="monospace" font-size="9" fill="#8AB8E8">M10</text>
  </g>
</svg>
